<!doctype html>
<html lang="es" data-theme="winter">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{%block title%} Bazar Stereo {%endblock%}</title>
        <link
            href="https://cdn.jsdelivr.net/npm/daisyui@5"
            rel="stylesheet"
            type="text/css"
        />
        <link
            href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
            rel="stylesheet"
            type="text/css"
        />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <link
            rel="stylesheet"
            href="{{url_for('static', filename='style/app.css')}}"
        />
    </head>
    <body class="min-h-screen flex flex-col">
        <!-- Navbar -->
        <div class="navbar shadow-sm bg-base-200">
            <div class="navbar-start">
                <a href="{{ url_for('inicio') }}" class="btn btn-link"
                    ><img
                        class="h-10 w-auto"
                        src="{{url_for('static', filename='img/logo_bazar_stereo.svg')}}"
                        alt="Bazar Stereo"
                /></a>
            </div>
            <div class="navbar-center">
                <ul class="menu menu-horizontal px-1">
                    <!-- Aqui, enlaces a la vista de todos los discos disponibles -->
                    <li>
                        <a href="{{ url_for('discos') }}" class="px-5"
                            >Discos</a
                        >
                    </li>
                    <!-- Aqui a los que estan solo disponibles en subastas -->
                    <li>
                        <a href="{{ url_for('subastas') }}" class="px-5"
                            >Subastas</a
                        >
                    </li>
                    <!-- Aqui a los que estan solo disponibles en ofertas -->
                    <li>
                        <a href="{{ url_for('ofertas') }}" class="px-5"
                            >Ofertas</a
                        >
                    </li>
                </ul>
            </div>
            <div class="navbar-end">
                <a class="btn btn-link btn-ghost btn-circle mx-2" href="#">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="20"
                        height="20"
                        fill="currentColor"
                        class="bi bi-cart-fill"
                        viewBox="0 0 16 16"
                    >
                        <path
                            d="M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .491.592l-1.5 8A.5.5 0 0 1 13 12H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5M5 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4m7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4m-7 1a1 1 0 1 1 0 2 1 1 0 0 1 0-2m7 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2"
                        />
                    </svg>
                </a>
                <p class="text-sm">¡Hola <strong>Cesar</strong>!</p>
                <div class="dropdown dropdown-end dropdown-hover">
                    <div tabindex="0" role="button" class="btn btn-link">
                        <div class="avatar">
                            <div class="w-10 rounded-full">
                                <img
                                    src="https://media.tenor.com/1W-HKNvj8UoAAAAM/cat.gif"
                                    alt="Logo"
                                />
                            </div>
                        </div>
                    </div>
                    <ul
                        tabindex="-1"
                        class="dropdown-content menu bg-base-100 rounded-box z-1 w-35 p-2 shadow-sm"
                    >
                        <li>
                            <a href="{{ url_for('mi_cuenta') }}">Mi cuenta</a>
                        </li>
                        <li>
                            <a><strong>Cerrar sesión</strong></a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
        <main class="container mx-auto p-4 grow">
            {% block content %}{% endblock %}
        </main>
        <!-- Footer -->
        <footer
            class="footer sm:footer-horizontal footer-center bg-neutral text-neutral-content p-4"
        >
            <aside>
                <p>
                    Copyright ©2026 - Todos los derechos reservados por
                    <strong>Bazar Stereo</strong>.
                </p>
            </aside>
        </footer>
    </body>
</html>
