{% extends "base.html" %} {% block content %}
<!-- Este archivo es la vista de todos los discos (No subastas; pero si ofertas) -->
<div class="container mx-auto p-4 flex flex-col md:flex-row gap-10">
    <aside class="w-full md:w-64 flex-shrink-0">
        <h1 class="text-4xl font-bold mb-10">Discos</h1>
        <div class="space-y-8">
            <div>
                <!-- Checkboxs para el formato del disco -->
                <h3 class="font-bold text-lg mb-2">Formato</h3>
                <div class="form-control">
                    <div class="flex flex-col gap-1">
                        <label class="label cursor-pointer justify-start gap-3">
                            <input
                                type="checkbox"
                                class="checkbox checkbox-xs"
                                name="formato"
                                value="cd"
                            />
                            <span class="label-text">CD</span>
                        </label>
                        <label class="label cursor-pointer justify-start gap-3">
                            <input
                                type="checkbox"
                                class="checkbox checkbox-xs"
                                name="formato"
                                value="vinilo"
                            />
                            <span class="label-text">Vinilo</span>
                        </label>
                    </div>
                </div>
                <div class="divider"></div>
                <!-- Checkbox para el genero del disco -->
                <h3 class="font-bold text-lg mb-2">Género</h3>
                <div class="flex flex-col gap-1">
                    {% for generos in lista_generos %}
                    <label class="label cursor-pointer justify-start gap-3">
                        <input
                            type="checkbox"
                            name="generos"
                            value="{{ generos }}"
                            class="checkbox checkbox-xs"
                        />
                        <span class="label-text">{{ generos }}</span>
                    </label>
                    {% endfor %}
                    <div class="divider"></div>
                </div>
            </div>
        </div>
    </aside>
    <!-- Cards para los discos -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-22">
        {% for elementos in range(12) %}
        <a href="#">
            <div
                class="card bg-base-200 w-full shadow-md active:scale-95 transition-transform duration-200 hover:shadow-lg cursor-pointer"
            >
                <figure>
                    <img
                        src="https://i.discogs.com/gAbVlOD03Gd1nHgG0PccLexBqioRnJQt8DlpaiFTERM/rs:fit/g:sm/q:90/h:516/w:600/czM6Ly9kaXNjb2dz/LWRhdGFiYXNlLWlt/YWdlcy9SLTM5NTQ1/NDAtMTY4MjU3MzY3/Mi05MTMxLmpwZWc.jpeg"
                        alt="Shoes"
                    />
                </figure>
                <div class="card-body">
                    <h2 class="card-title">
                        Album Phil Collins ...But Seriously Semi nuevo
                    </h2>
                    <p>
                        Lorem ipsum dolor sit amet, consectetur adipiscing elit.
                    </p>
                </div>
            </div>
        </a>
        {% endfor %}
    </div>
</div>
<div class="join flex justify-end w-full my-10">
    <input
        class="join-item btn btn-square"
        type="radio"
        name="options"
        aria-label="1"
        checked="checked"
    />
    <input
        class="join-item btn btn-square"
        type="radio"
        name="options"
        aria-label="2"
    />
    <input
        class="join-item btn btn-square"
        type="radio"
        name="options"
        aria-label="3"
    />
    <input
        class="join-item btn btn-square"
        type="radio"
        name="options"
        aria-label="4"
    />
    <input
        class="join-item btn btn-square"
        type="radio"
        name="options"
        aria-label="5"
    />
</div>
{% endblock %}
