<!doctype html>
<html lang="es" data-theme="autumn">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{%block title%} Bazar Stereo {%endblock%}</title>
        <link
            href="https://cdn.jsdelivr.net/npm/daisyui@5"
            rel="stylesheet"
            type="text/css"
        />
        <link
            href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
            rel="stylesheet"
            type="text/css"
        />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <link
            rel="stylesheet"
            href="{{url_for('static', filename='style/app.css')}}"
        />
    </head>
    <body class="min-h-screen flex flex-col">
        <!-- Navbar -->
        <div
            class="navbar bg-base-100/70 backdrop-blur-lg border-b border-base-content/10 px-4 py-2 sticky top-0 z-50"
        >
            <div class="navbar-start">
                <div class="dropdown">
                    <div
                        tabindex="0"
                        role="button"
                        class="btn btn-ghost btn-sm lg:hidden"
                    >
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            class="h-5 w-5"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke="currentColor"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                stroke-width="2"
                                d="M4 6h16M4 12h8m-8 6h16"
                            />
                        </svg>
                    </div>
                    <ul
                        tabindex="0"
                        class="menu menu-sm dropdown-content mt-2 z-50 p-2 shadow bg-base-100 rounded-box w-52"
                    >
                        <li>
                            <a href="{{ url_for('discos.discos') }}">Discos</a>
                        </li>
                        <li>
                            <a href="{{ url_for('subastas.subastas') }}"
                                >Subastas</a
                            >
                        </li>
                    </ul>
                </div>
                <a
                    href="{{ url_for('main.inicio') }}"
                    class="btn btn-link p-0 ml-2"
                >
                    <img
                        class="h-8 md:h-10 w-auto"
                        src="{{url_for('static', filename='img/logo_bazar_stereo.svg')}}"
                        alt="Bazar Stereo"
                    />
                </a>
            </div>

            <div class="navbar-center hidden lg:flex">
                <ul class="menu menu-horizontal px-1 gap-2 font-bold">
                    <li>
                        <a href="{{ url_for('discos.discos') }}">Discos</a>
                    </li>
                    <li>
                        <a href="{{ url_for('subastas.subastas') }}"
                            >Subastas</a
                        >
                    </li>
                </ul>
            </div>

            <div class="navbar-end gap-3">
                <p class="text-sm hidden sm:block">
                    ¡Hola <strong>Cesar</strong>!
                </p>

                <div class="dropdown dropdown-end">
                    <div
                        tabindex="0"
                        role="button"
                        class="btn btn-ghost btn-circle avatar"
                    >
                        <div class="w-10 rounded-full">
                            <img
                                src="https://media.tenor.com/1W-HKNvj8UoAAAAM/cat.gif"
                            />
                        </div>
                    </div>
                    <ul
                        tabindex="0"
                        class="menu menu-sm dropdown-content mt-2 z-50 p-2 shadow bg-base-100 rounded-box w-52"
                    >
                        <li>
                            <a href="{{ url_for('main.mi_cuenta') }}"
                                >Mi cuenta</a
                            >
                        </li>
                        <li>
                            <a class="text-error font-bold">Cerrar sesión</a>
                        </li>
                    </ul>
                </div>

                <!-- Label para el carrito -->
                <a
                    href="{{ url_for('main.carrito') }}"
                    class="btn btn-ghost btn-circle indicator"
                >
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        class="h-6 w-6"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke="currentColor"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 100 4 2 2 0 000-4z"
                        />
                    </svg>
                    <span class="badge badge-sm badge-secondary indicator-item"
                        >{{ carrito | length }}</span
                    >
                </a>
            </div>
        </div>
        <main class="grow">{% block content %}{% endblock %}</main>
        <!-- Footer -->
        <footer
            class="footer sm:footer-horizontal footer-center bg-neutral text-neutral-content py-6 border-t border-neutral-700/40"
            id="main-footer"
        >
            <aside>
                <p class="text-sm opacity-80 tracking-wide">
                    Copyright ©2026 — Todos los derechos reservados por
                    <strong class="font-semibold">Bazar Stereo</strong>.
                </p>
            </aside>
        </footer>
    </body>
</html>
