{% extends "base.html" %} {% block title %} Subastas | Bazar Stereo {% endblock %} {% block content %}
<!-- Este archivo es la vista de todos los discos (No subastas; pero si ofertas) -->
<div class="container mx-auto p-4 flex flex-col md:flex-row gap-10">
    <aside class="w-full md:w-64 flex-shrink-0 md:sticky md:top-24 self-start">
        <div class="mb-10">
            <h1 class="text-3xl font-black tracking-tighter text-base-content">
                Subastas
            </h1>
            <div class="h-1 w-12 bg-secondary mt-1 rounded-full"></div>
        </div>

        <div class="space-y-10">
            <section>
                <div class="flex items-center justify-between mb-4">
                    <h3
                        class="text-xs font-bold uppercase tracking-widest text-base-content/50"
                    >
                        Formato
                    </h3>
                </div>

                <div class="grid grid-cols-1 gap-1">
                    <label
                        class="group flex items-center justify-between p-2 rounded-lg hover:bg-base-200 transition-all cursor-pointer"
                    >
                        <div class="flex items-center gap-3">
                            <input
                                type="checkbox"
                                name="formato"
                                value="cd"
                                class="checkbox checkbox-secondary checkbox-sm border-2 rounded-md"
                            />
                            <span
                                class="text-sm font-medium group-hover:translate-x-1 transition-transform"
                                >CD</span
                            >
                        </div>
                    </label>

                    <label
                        class="group flex items-center justify-between p-2 rounded-lg hover:bg-base-200 transition-all cursor-pointer"
                    >
                        <div class="flex items-center gap-3">
                            <input
                                type="checkbox"
                                name="formato"
                                value="vinilo"
                                class="checkbox checkbox-secondary checkbox-sm border-2 rounded-md"
                            />
                            <span
                                class="text-sm font-medium group-hover:translate-x-1 transition-transform"
                                >Vinilo</span
                            >
                        </div>
                    </label>
                </div>
            </section>
    </aside>
    <!-- Card para los discos -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-5">
        {% for elementos in range(12) %}
        <a href="#" class="group">
            <div
                class="card bg-base-200/70 backdrop-blur-md border border-base-content/10 w-full shadow-md transition-all duration-300 hover:shadow-xl hover:-translate-y-1 active:scale-95 cursor-pointer"
            >
                <figure class="h-48 overflow-hidden">
                    <img
                        src="https://i.discogs.com/gAbVlOD03Gd1nHgG0PccLexBqioRnJQt8DlpaiFTERM/rs:fit/g:sm/q:90/h:516/w:600/czM6Ly9kaXNjb2dz/LWRhdGFiYXNlLWlt/YWdlcy9SLTM5NTQ1/NDAtMTY4MjU3MzY3/Mi05MTMxLmpwZWc.jpeg"
                        alt="Shoes"
                        class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
                    />
                </figure>
                <div class="card-body p-4">
                    <h2 class="card-title line-clamp-2 text-base">
                        Album Phil Collins ...But Seriously Semi nuevo
                    </h2>
                    <p class="text-sm line-clamp-3">
                        Lorem ipsum dolor sit amet, consectetur adipiscing elit.
                    </p>
                </div>
            </div>
        </a>
        {% endfor %}
    </div>
</div>
<div class="join flex justify-center w-full my-10">
    <input
        class="join-item btn btn-square"
        type="radio"
        name="options"
        aria-label="1"
        checked="checked"
    />
    <input
        class="join-item btn btn-square"
        type="radio"
        name="options"
        aria-label="2"
    />
    <input
        class="join-item btn btn-square"
        type="radio"
        name="options"
        aria-label="3"
    />
    <input
        class="join-item btn btn-square"
        type="radio"
        name="options"
        aria-label="4"
    />
    <input
        class="join-item btn btn-square"
        type="radio"
        name="options"
        aria-label="5"
    />
</div>
{% endblock %}
